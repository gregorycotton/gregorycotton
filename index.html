<script> 
// --------------- INITIALIZE DRAG/DROP --------------- //
    interact('.draggable').draggable({
        inertia: true,
        restrict: {
          restriction: "html",
          endOnly: true,
        },
        onmove: function (event) {
          var target = event.target,
              // --------------- SAVE THE DRAGGED POSITION ---------------
              x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx,
              y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
    
          // --------------- TRANSLATE --------------- //
          target.style.webkitTransform =
          target.style.transform = 'translate(' + x + 'px, ' + y + 'px)';
    
          // --------------- UPDATE --------------- //
          target.setAttribute('data-x', x);
          target.setAttribute('data-y', y);
        },
        onend: function(event) {
            console.log(event);
        }
    });

    interact('.dropcircle').dropzone({
        accept: '.draggable',
        overlap: 0.01,

        // --------------- ADD/REMOVE DROPCIRCLE EFFECTS --------------- //
        ondropactivate: function (event) {
            event.target.classList.add('drop-active');
        },
        ondropdeactivate: function (event) {
            event.target.classList.remove('drop-active');
        },

        // --------------- ADD/REMOVE DROPCIRCLE EFFECTS --------------- //
        ondragenter: function (event) {
            var draggableElement = event.relatedTarget,
                dropzoneElement = event.target;
            
            dropzoneElement.classList.add('drop-target');
            draggableElement.classList.add('can-drop');
            
            // --------------- IDENTIFY WHAT LINK TO OPEN (M FOR MOBILE) --------------- //
            if(draggableElement == document.getElementById("about")) {
                event.preventDefault();
                window.open("about.html", "_self");
            } else if (draggableElement == document.getElementById("photo")) {
                event.preventDefault();
                window.open("photography.html", "_self");
            } else if (draggableElement == document.getElementById("design")) {
                event.preventDefault();
                window.open("design.html", "_self");
            } else if (draggableElement == document.getElementById("doc")) {
                event.preventDefault();
                window.open("vintageuprising.html", "_self");
            } else if (draggableElement == document.getElementById("boomers")) {
                event.preventDefault();
                window.open("boomers.html", "_self");
            } else if (draggableElement == document.getElementById("clients")) {
                event.preventDefault();
                window.open("clients.html", "_self");
            } else if (draggableElement == document.getElementById("aboutM")) {
                event.preventDefault();
                window.open("photography.html", "_self");
            } else if (draggableElement == document.getElementById("photoM")) {
                event.preventDefault();
                window.open("photography.html", "_self");
            } else if (draggableElement == document.getElementById("designM")) {
                event.preventDefault();
                window.open("design.html", "_self");
            } else if (draggableElement == document.getElementById("docM")) {
                event.preventDefault();
                window.open("vintageuprising.html", "_self");
            } else if (draggableElement == document.getElementById("boomersM")) {
                event.preventDefault();
                window.open("boomers.html", "_self");
            } else if (draggableElement == document.getElementById("clientsM")) {
                event.preventDefault();
                window.open("clients.html", "_self");
            }
        },
                                   
        ondragleave: function (event) {
            event.target.classList.remove('drop-target');
            event.relatedTarget.classList.remove('can-drop');
        },

        // --------------- IF SUCCESS --------------- //
        ondrop: function (event) {
            console.log(event);
        }
    });  
    
// --------------- CHANGE TAB HEADER  --------------- //
    $(function() {
        var message = "hey no wait come back";
        var original;

    $(window).focus(function() {
        if (original) { document.title = original;}
            }).blur(function() {
                var title = $('title').text();
                if (title != message) { original = title }
                    document.title = message;
        });
    });
</script>
