<body onmousemove="mousemove()">
<a href="index.html"><img src="index/display/logo.png"></a>
   
<span id="textSpan" style="position:absolute"><figcaption>click to begin</figcaption></span>
</body>
    
<script>
    
$( "body" ).bind( "click", function() {
    window.location.href="index.html"
});
    
function mousemove()
{
$('#textSpan').css({
    'top' : event.pageY,
    'left' : event.pageX
}); 
}
    
function colorChoice(){
    var colorArray = ['#ff0000', '#0090ff', '#1ab51b', '#f5ff00'];
    return colorArray[Math.floor(Math.random() * colorArray.length)];
}

function positionGen(){
    return Math.floor((Math.random()*100)) + "%";
}

function newSqr(){
    var div = document.createElement("div");
    div.style.background = colorChoice();
    div.style.left = positionGen();
    div.style.top = positionGen();
    $("body").append(div);
}
    
var squares = window.setInterval(newSqr, 750);
</script>
