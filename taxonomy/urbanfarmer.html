    <p><strong>The Urban Farmer</strong><br>2019<br>Photography, Urbanization, Image Series</p>

    <br>

    <p>A farmer grows high quality produce within his temperature controlled condo in Toronto, Ontario.</p>

    <img alt="A farmer sits dejected in a garden inside his living room" src="media/urbanfarmer/tomtheurbanfarmer.jpg">

    <img alt="Produce from the farm sits in a wicker basket, surrounded by beer cans in the living room garden"
      src="media/urbanfarmer/beercansandproduce.jpg">

    <img alt="The farmer sits on his couch and wipes his brow" src="media/urbanfarmer/afternoonsrest.jpg">

    <img alt="Portrait of the farmer, shoulders up, against a background of floral wallpaper"
      src="media/urbanfarmer/portraitofafarmer.jpg">

    <img alt="Overhead shot of the farmer's soup: with a whole fish, potato and tomato in it"
      src="media/urbanfarmer/tomssoup.jpg">

    <img alt="The farmer sips soup from a spoon to taste test his dinner before serving"
      src="media/urbanfarmer/tastetest.jpg">

    <img alt="Edible fungus grows from the corner of the farmer's shower" src="media/urbanfarmer/newgrowth.jpg">

    <img alt="The farmers small and old television unit displays a photo of a much bigger outdoors farm"
      src="media/urbanfarmer/entertainment.jpg">

    <img alt="In his living room garden, the farmer harvests lettuce" src="media/urbanfarmer/harvest.jpg">

    <img alt="A blue tarp lines the bathtub so that the farmer can clean his newly harvested crops"
      src="media/urbanfarmer/cleaningtheproduce.jpg">

    <img
      alt="The farmer looks himself in the bathrom mirror. In the background, herbs hang from the shower curtain rod to dry"
