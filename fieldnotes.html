    <style>
        body {
            width: auto;
            margin: 40px;
            font-family: Arial, sans-serif;
            background-color: #FFF;

            color: #000;
        }

        body *::selection {
            color: #FFF;
            background: #000;
        }

        body *::-moz-selection {

            background: #000;
        }

        header {
            padding-bottom: 20px;
        }

        hr {
            border-top: none;
            border-left: none;

        summary {

        header details>summary::-webkit-details-marker {

        }

        header details>summary {
            list-style-type: none;
        }

        ul,
        li {
            margin-left: 0.25em;
            padding-left: 0.25em;
        }

            margin-left: 0.5em;
            list-style: disc;

        }

        li,

            padding: 0 0 0.5em 0;

        }

        a.link,
        a.link:link,
        a.link:visited,
        a.link:hover,
        a.link:active {
            text-decoration: underline;
            color: #0000EE;
        }

        table,
        th,
        td {
            text-align: left;
            border: 1.5px solid black;
            border-collapse: collapse;
        }

        td,
        th {
            padding: 8px 6px;
        }

        table {
            filter: drop-shadow(1.5px 1.5px 0px #000);
        }

        tr:nth-child(even) {
            background-color: #F6F6F6;
        }

        tr:nth-child(odd) {
            background-color: #FFFFFF;
        }
        
        #page-content {
            width: 500px;
        }
        
        #table-container {
            max-width: 70em;
        }

        #info {
            line-height: 125%;
        }

        #name,
        #profile,
        #projects,
        #contact,
        #info {
            margin: 0px 0px 20px 0px;
        }

        @media only screen and (max-width: 600px) {
            body {
                margin: 15px;
            }

            #page-content {
                width: 90vw;
                margin: 0;
                padding: 0;
            }

            table.narrow {
                width: 100%;
            }

            table.wide {
                width: 100%;
            }
